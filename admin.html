<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — 여행 취향 발견기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0d0e;
    --surface: #16171a;
    --card:    #1e1f24;
    --border:  rgba(255,255,255,.08);
    --terra:   #C4704B;
    --sage:    #7A9A7E;
    --gold:    #C4A84B;
    --text:    #e8e4dc;
    --muted:   #7a7672;
    --danger:  #C45A5A;
    --success: #5AC47A;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* ── 로그인 화면 ── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 1rem;
  }
  .login-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 2.5rem 2rem; width: 320px; text-align: center;
  }
  .login-logo { font-size: 2rem; margin-bottom: .5rem; }
  .login-title { font-size: 1.1rem; font-weight: 600; color: var(--terra); margin-bottom: .3rem; }
  .login-sub   { font-size: .78rem; color: var(--muted); margin-bottom: 1.6rem; }
  .login-input {
    width: 100%; padding: .7rem 1rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-size: .9rem; outline: none; transition: border-color .2s;
  }
  .login-input:focus { border-color: var(--terra); }
  .login-btn {
    width: 100%; margin-top: .8rem; padding: .75rem; background: var(--terra);
    border: none; border-radius: 8px; color: #fff; font-size: .9rem;
    font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .login-btn:hover { opacity: .85; }
  .login-err { font-size: .78rem; color: var(--danger); margin-top: .5rem; min-height: 1rem; }

  /* ── 어드민 레이아웃 ── */
  #adminScreen { display: none; height: 100vh; overflow: hidden; }
  .admin-layout { display: flex; height: 100%; }

  /* 사이드바 */
  .sidebar {
    width: 220px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-logo {
    padding: 1.2rem 1rem .8rem; font-size: .75rem; color: var(--terra);
    letter-spacing: .08em; font-weight: 700; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .5rem;
  }
  .sidebar-logo span { font-size: 1rem; }
  .nav-section { padding: .8rem .6rem .4rem; font-size: .65rem; color: var(--muted); letter-spacing: .1em; font-weight: 600; }
  .nav-item {
    margin: .15rem .4rem; padding: .55rem .8rem; border-radius: 7px; cursor: pointer;
    font-size: .82rem; color: var(--muted); transition: background .15s, color .15s;
    display: flex; align-items: center; gap: .55rem;
  }
  .nav-item:hover { background: rgba(255,255,255,.05); color: var(--text); }
  .nav-item.active { background: rgba(196,112,75,.15); color: var(--terra); }
  .nav-item .nav-icon { font-size: .9rem; width: 18px; text-align: center; }
  .sidebar-footer {
    margin-top: auto; padding: .8rem 1rem; border-top: 1px solid var(--border);
    font-size: .7rem; color: var(--muted);
  }
  .logout-btn { color: var(--danger); cursor: pointer; text-decoration: underline; background: none; border: none; font-size: .7rem; margin-top: .2rem; display: block; }

  /* 메인 영역 */
  .main-area { flex: 1; overflow-y: auto; background: var(--bg); }
  .panel { display: none; padding: 1.8rem 2rem; }
  .panel.active { display: block; }
  .panel-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: .3rem; }
  .panel-sub    { font-size: .78rem; color: var(--muted); margin-bottom: 1.6rem; }

  /* ── 통계 패널 ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .8rem; margin-bottom: 2rem; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem 1.2rem;
  }
  .stat-label { font-size: .68rem; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: .4rem; }
  .stat-val   { font-size: 2rem; font-weight: 700; color: var(--terra); line-height: 1; }
  .stat-sub   { font-size: .7rem; color: var(--muted); margin-top: .25rem; }

  .chart-title { font-size: .8rem; font-weight: 600; color: var(--text); margin-bottom: .8rem; }
  .bar-chart { display: flex; align-items: flex-end; gap: .4rem; height: 100px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .8rem 1rem; }
  .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .bar-wrap  { flex: 1; width: 100%; display: flex; align-items: flex-end; gap: 2px; }
  .bar {
    flex: 1; border-radius: 3px 3px 0 0; min-height: 2px;
    transition: height .4s ease;
  }
  .bar.b-profile { background: var(--terra); }
  .bar.b-itin    { background: var(--sage); }
  .bar-label { font-size: .55rem; color: var(--muted); white-space: nowrap; }
  .chart-legend { display: flex; gap: 1rem; margin-top: .6rem; }
  .legend-item { display: flex; align-items: center; gap: .35rem; font-size: .7rem; color: var(--muted); }
  .legend-dot  { width: 8px; height: 8px; border-radius: 2px; }

  /* ── 도시 에디터 패널 ── */
  .city-editor-layout { display: grid; grid-template-columns: 200px 1fr; gap: 1rem; height: calc(100vh - 120px); }
  .city-list-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    overflow-y: auto; padding: .5rem;
  }
  .city-search {
    width: 100%; padding: .5rem .7rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px; color: var(--text);
    font-size: .78rem; outline: none; margin-bottom: .4rem;
  }
  .city-search:focus { border-color: var(--terra); }
  .city-list-item {
    padding: .45rem .7rem; border-radius: 5px; cursor: pointer;
    font-size: .8rem; color: var(--muted); transition: all .15s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .city-list-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
  .city-list-item.active { background: rgba(196,112,75,.15); color: var(--terra); }
  .city-override-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

  .city-edit-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 1.4rem 1.6rem; overflow-y: auto;
  }
  .city-edit-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: .85rem; }
  .edit-section-title { font-size: .68rem; color: var(--terra); letter-spacing: .1em; font-weight: 600; text-transform: uppercase; margin-bottom: .6rem; margin-top: 1.2rem; }
  .edit-section-title:first-child { margin-top: 0; }
  .form-row { margin-bottom: .8rem; }
  .form-label { display: block; font-size: .72rem; color: var(--muted); margin-bottom: .3rem; }
  .form-input, .form-textarea {
    width: 100%; padding: .55rem .8rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 7px; color: var(--text);
    font-size: .83rem; outline: none; transition: border-color .2s; font-family: inherit;
    resize: vertical;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--terra); }
  .form-textarea { min-height: 72px; }
  .char-count { font-size: .65rem; color: var(--muted); text-align: right; margin-top: .2rem; }
  .char-count.over { color: var(--danger); }

  .edit-actions { display: flex; gap: .6rem; margin-top: 1.4rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .btn-primary { padding: .55rem 1.2rem; background: var(--terra); border: none; border-radius: 7px; color: #fff; font-size: .82rem; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .45; cursor: default; }
  .btn-ghost { padding: .55rem 1rem; background: transparent; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); font-size: .82rem; cursor: pointer; transition: all .2s; }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }
  .btn-danger { padding: .55rem 1rem; background: transparent; border: 1px solid rgba(196,90,90,.4); border-radius: 7px; color: var(--danger); font-size: .82rem; cursor: pointer; }
  .btn-danger:hover { background: rgba(196,90,90,.1); }

  .save-status { font-size: .75rem; color: var(--success); margin-left: auto; display: flex; align-items: center; gap: .3rem; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px; padding: .6rem 1rem;
    font-size: .8rem; color: var(--text); opacity: 0; transform: translateY(8px);
    transition: all .25s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* 로딩 스피너 */
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.2); border-top-color: var(--terra); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🧭</div>
    <div class="login-title">Admin</div>
    <div class="login-sub">여행 취향 발견기 관리 콘솔</div>
    <input type="password" id="pwdInput" class="login-input" placeholder="패스워드 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── 어드민 ── -->
<div id="adminScreen">
  <div class="admin-layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-logo"><span>🧭</span> 관리 콘솔</div>
      <div class="nav-section">메뉴</div>
      <div class="nav-item active" onclick="showPanel('stats',this)"><span class="nav-icon">📊</span> 통계</div>
      <div class="nav-item" onclick="showPanel('cities',this)"><span class="nav-icon">🗺️</span> 도시 편집</div>
      <div class="sidebar-footer">
        <div style="color:var(--terra);font-weight:600;margin-bottom:.2rem">Admin</div>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </aside>

    <!-- 메인 -->
    <main class="main-area">

      <!-- 통계 패널 -->
      <div class="panel active" id="panel-stats">
        <div class="panel-title">통계 대시보드</div>
        <div class="panel-sub">저장된 프로필과 일정 현황을 확인합니다.</div>
        <div class="stat-grid" id="statGrid">
          <div class="stat-card"><div class="stat-label">총 프로필 저장</div><div class="stat-val" id="s-totalP">—</div><div class="stat-sub">누적 전체</div></div>
          <div class="stat-card"><div class="stat-label">총 일정 저장</div><div class="stat-val" id="s-totalI">—</div><div class="stat-sub">누적 전체</div></div>
          <div class="stat-card"><div class="stat-label">오늘 프로필</div><div class="stat-val" id="s-todayP" style="color:var(--sage)">—</div><div class="stat-sub">오늘 기준</div></div>
          <div class="stat-card"><div class="stat-label">오늘 일정</div><div class="stat-val" id="s-todayI" style="color:var(--gold)">—</div><div class="stat-sub">오늘 기준</div></div>
        </div>
        <div class="chart-title">최근 7일 활동</div>
        <div class="bar-chart" id="barChart"><div style="color:var(--muted);font-size:.75rem;margin:auto">데이터 로딩 중...</div></div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--terra)"></div>프로필 저장</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--sage)"></div>일정 저장</div>
        </div>
      </div>

      <!-- 도시 편집 패널 -->
      <div class="panel" id="panel-cities">
        <div class="panel-title">도시 데이터 편집</div>
        <div class="panel-sub">설명·감각 정보를 수정하면 Redis 오버라이드로 저장됩니다. ● 표시된 도시는 오버라이드 적용 중.</div>
        <div class="city-editor-layout">

          <!-- 도시 목록 -->
          <div class="city-list-panel">
            <input class="city-search" type="text" placeholder="도시 검색..." oninput="filterCities(this.value)" id="citySearch">
            <div id="cityListItems"></div>
          </div>

          <!-- 편집 폼 -->
          <div class="city-edit-panel" id="cityEditPanel">
            <div class="city-edit-empty">← 도시를 선택해 주세요</div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════
   Admin Logic
═══════════════════════════════ */

let adminToken = sessionStorage.getItem('adminToken') || null;
let currentCity = null;
let overrideMap = {}; // cityId → true (has override)

// ── 도시 목록 (배열 — config.js 없이 하드코딩) ──
const CITIES = [
  {id:'paris',name:'파리'},{id:'london',name:'런던'},{id:'new_york',name:'뉴욕'},
  {id:'rome',name:'로마'},{id:'barcelona',name:'바르셀로나'},{id:'tokyo',name:'도쿄'},
  {id:'kyoto',name:'교토'},{id:'osaka',name:'오사카'},{id:'sapporo',name:'삿포로'},
  {id:'taipei',name:'타이베이'},{id:'hong_kong',name:'홍콩'},{id:'singapore',name:'싱가포르'},
  {id:'bangkok',name:'방콕'},{id:'chiang_mai',name:'치앙마이'},{id:'da_nang',name:'다낭'},
  {id:'kota_kinabalu',name:'코타키나발루'},{id:'bali',name:'발리'},{id:'shanghai',name:'상하이'},
  {id:'amsterdam',name:'암스테르담'},{id:'berlin',name:'베를린'},{id:'vienna',name:'비엔나'},
  {id:'prague',name:'프라하'},{id:'budapest',name:'부다페스트'},{id:'porto',name:'포르투'},
  {id:'lisbon',name:'리스본'},{id:'istanbul',name:'이스탄불'},
  {id:'dubai',name:'두바이'},{id:'morocco',name:'모로코'},
  {id:'sydney',name:'시드니'},
  {id:'san_francisco',name:'샌프란시스코'},{id:'seattle',name:'시애틀'},{id:'hawaii',name:'하와이'}
];

// ── 초기화 ──
window.addEventListener('DOMContentLoaded', () => {
  if (adminToken) showAdmin();
});

async function doLogin() {
  const pwd = document.getElementById('pwdInput').value.trim();
  if (!pwd) return;
  const btn = document.querySelector('.login-btn');
  btn.textContent = '확인 중...'; btn.disabled = true;

  try {
    const res = await fetch('/api/db', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'adminCheck', pwd})
    });
    const json = await res.json();
    if (!json.ok) throw new Error('invalid');
    adminToken = json.token;
    sessionStorage.setItem('adminToken', adminToken);
    showAdmin();
  } catch {
    document.getElementById('loginErr').textContent = '패스워드가 올바르지 않습니다.';
    btn.textContent = '로그인'; btn.disabled = false;
  }
}

function doLogout() {
  adminToken = null;
  sessionStorage.removeItem('adminToken');
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwdInput').value = '';
}

function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'flex';
  loadStats();
  renderCityList(CITIES);
}

// ── 패널 전환 ──
function showPanel(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'stats') loadStats();
}

// ── 통계 로드 ──
async function loadStats() {
  try {
    const res  = await fetch(`/api/db?action=getDetailedStats&token=${encodeURIComponent(adminToken)}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    document.getElementById('s-totalP').textContent = json.totalProfiles.toLocaleString();
    document.getElementById('s-totalI').textContent = json.totalItins.toLocaleString();
    const today = json.daily?.[json.daily.length - 1];
    document.getElementById('s-todayP').textContent = today?.profiles ?? 0;
    document.getElementById('s-todayI').textContent = today?.itins ?? 0;

    renderBarChart(json.daily || []);
  } catch(e) {
    console.error(e);
    toast('통계 로드 실패: ' + e.message);
  }
}

function renderBarChart(daily) {
  const maxVal = Math.max(1, ...daily.map(d => Math.max(d.profiles, d.itins)));
  const chart  = document.getElementById('barChart');
  chart.innerHTML = daily.map(d => {
    const ph = Math.round((d.profiles / maxVal) * 80);
    const ih = Math.round((d.itins    / maxVal) * 80);
    const label = d.date.slice(5); // MM-DD
    return `<div class="bar-group">
      <div class="bar-wrap">
        <div class="bar b-profile" style="height:${ph}px" title="${d.profiles}개"></div>
        <div class="bar b-itin"    style="height:${ih}px" title="${d.itins}개"></div>
      </div>
      <div class="bar-label">${label}</div>
    </div>`;
  }).join('');
}

// ── 도시 목록 ──
function renderCityList(list) {
  document.getElementById('cityListItems').innerHTML = list.map(c =>
    `<div class="city-list-item${currentCity?.id===c.id?' active':''}" onclick="selectCity('${c.id}','${c.name}')" id="ci-${c.id}">
      <span>${c.name}</span>
      ${overrideMap[c.id] ? '<span class="city-override-dot"></span>' : ''}
    </div>`
  ).join('');
}

function filterCities(q) {
  const filtered = CITIES.filter(c => c.name.includes(q) || c.id.includes(q.toLowerCase()));
  renderCityList(filtered);
}

// ── 도시 선택 → 데이터 로드 ──
async function selectCity(id, name) {
  currentCity = { id, name };
  document.querySelectorAll('.city-list-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ci-' + id);
  if (el) el.classList.add('active');

  const panel = document.getElementById('cityEditPanel');
  panel.innerHTML = `<div class="city-edit-empty"><div class="spin"></div>&nbsp; ${name} 데이터 로딩...</div>`;

  try {
    // 정적 JSON과 Redis 오버라이드 병렬 로드
    const [staticRes, overrideRes] = await Promise.all([
      fetch(`taste/assets/cities/${id}.json`).catch(() => null),
      fetch(`/api/db?action=getCityData&cityId=${id}`)
    ]);

    const staticData   = staticRes?.ok ? await staticRes.json() : null;
    const overrideJson = await overrideRes.json();
    const override     = overrideJson?.data || null;

    // 오버라이드 우선, 없으면 정적
    const data = { ...(staticData || {}), ...(override || {}) };
    if (override) overrideMap[id] = true;

    renderEditForm(id, name, data, !!override);
  } catch(e) {
    panel.innerHTML = `<div class="city-edit-empty" style="color:var(--danger)">데이터 로드 실패: ${e.message}</div>`;
  }
}

// ── 편집 폼 렌더링 ──
function renderEditForm(id, name, data, hasOverride) {
  const descLen = (data.description||'').length;
  document.getElementById('cityEditPanel').innerHTML = `
    <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1rem">
      <div style="font-size:1rem;font-weight:700;color:var(--text)">${name}</div>
      <code style="font-size:.65rem;color:var(--muted);background:var(--surface);padding:.15rem .4rem;border-radius:4px">${id}</code>
      ${hasOverride ? '<span style="font-size:.65rem;color:var(--gold);background:rgba(196,168,75,.12);padding:.15rem .5rem;border-radius:4px">● 오버라이드 적용 중</span>' : ''}
    </div>

    <div class="edit-section-title">기본 설명</div>
    <div class="form-row">
      <label class="form-label">description <span style="color:var(--muted)">(최대 100자, 존댓말)</span></label>
      <textarea class="form-textarea" id="fe-desc" rows="3" oninput="updateCharCount(this,'cc-desc',100)" style="min-height:60px">${data.description||''}</textarea>
      <div class="char-count${descLen>100?' over':''}" id="cc-desc">${descLen}/100자</div>
    </div>

    <div class="edit-section-title">감각 정보</div>
    <div class="form-row">
      <label class="form-label">👁 시각 (sight)</label>
      <textarea class="form-textarea" id="fe-sight" rows="2">${data.senses?.sight||''}</textarea>
    </div>
    <div class="form-row">
      <label class="form-label">👂 청각 (sound)</label>
      <textarea class="form-textarea" id="fe-sound" rows="2">${data.senses?.sound||''}</textarea>
    </div>
    <div class="form-row">
      <label class="form-label">👃 후각 (smell)</label>
      <textarea class="form-textarea" id="fe-smell" rows="2">${data.senses?.smell||''}</textarea>
    </div>

    <div class="edit-section-title">계절 정보</div>
    ${['spring','summer','autumn','winter'].map(s => `
    <div class="form-row">
      <label class="form-label">${{spring:'🌸 봄',summer:'☀️ 여름',autumn:'🍂 가을',winter:'❄️ 겨울'}[s]}</label>
      <textarea class="form-textarea" id="fe-${s}" rows="2">${data.seasons?.[s]?.text||''}</textarea>
    </div>`).join('')}

    <div class="edit-actions">
      <button class="btn-primary" onclick="saveCityData('${id}','${name}')" id="saveBtn">저장</button>
      ${hasOverride ? `<button class="btn-danger" onclick="resetCityOverride('${id}','${name}')">오버라이드 삭제</button>` : ''}
      <button class="btn-ghost" onclick="selectCity('${id}','${name}')">새로고침</button>
      <span id="saveStatus" class="save-status" style="display:none"></span>
    </div>`;
}

function updateCharCount(el, countId, max) {
  const len = el.value.length;
  const cc  = document.getElementById(countId);
  if (!cc) return;
  cc.textContent = `${len}/${max}자`;
  cc.classList.toggle('over', len > max);
}

// ── 도시 데이터 저장 ──
async function saveCityData(id, name) {
  const btn = document.getElementById('saveBtn');
  const sta = document.getElementById('saveStatus');
  btn.disabled = true; btn.textContent = '저장 중...';

  const seasons = {};
  ['spring','summer','autumn','winter'].forEach(s => {
    const val = document.getElementById('fe-' + s)?.value?.trim();
    if (val) seasons[s] = { text: val };
  });

  const data = {
    description: document.getElementById('fe-desc')?.value?.trim() || '',
    senses: {
      sight: document.getElementById('fe-sight')?.value?.trim() || '',
      sound: document.getElementById('fe-sound')?.value?.trim() || '',
      smell: document.getElementById('fe-smell')?.value?.trim() || ''
    },
    seasons
  };

  try {
    const res  = await fetch('/api/db', {
      method: 'POST', headers: {'Content-Type':'application/json', 'x-admin-token': adminToken},
      body: JSON.stringify({ action: 'saveCityData', cityId: id, data, token: adminToken })
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'failed');

    overrideMap[id] = true;
    renderCityList(CITIES.filter(c => document.getElementById('citySearch').value === '' || c.name.includes(document.getElementById('citySearch').value)));
    sta.style.display = 'flex'; sta.textContent = '✓ 저장됨';
    setTimeout(() => { sta.style.display = 'none'; }, 2500);
    toast(`${name} 데이터가 저장됐어요 ✓`);
  } catch(e) {
    toast('저장 실패: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '저장';
  }
}

// ── 오버라이드 삭제 (빈 데이터로 덮어쓰기) ──
async function resetCityOverride(id, name) {
  if (!confirm(`${name}의 오버라이드를 삭제하고 기본 JSON으로 돌아가시겠어요?`)) return;
  try {
    await fetch('/api/db', {
      method: 'POST', headers: {'Content-Type':'application/json', 'x-admin-token': adminToken},
      body: JSON.stringify({ action: 'saveCityData', cityId: id, data: {_deleted: true}, token: adminToken })
    });
    delete overrideMap[id];
    await selectCity(id, name);
    toast(`${name} 오버라이드 삭제됨`);
  } catch(e) { toast('삭제 실패: ' + e.message); }
}

// ── 토스트 ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
</body>
</html>
